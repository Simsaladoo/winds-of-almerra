<!DOCTYPE html>
<html>

<head>
  {% include head.html %}
  <!-- ADD LEAFLET CSS -->
  <link rel="stylesheet" href="https://almerra.com/assets/css/leaflet.css" />
  <style>
    /* ADD MAP STYLING */
    #map { width: 100%; height: 600px; background: #1a1a2e; }
  </style>
</head>

<body class="body-sim">
  {% include navbar.html %}

  <section class="hero is-fullheight has-text-centered" id="post">
    <div class="hero-body hero-sim">
      <div class="container">
        <a href="{{page.url | relative_url}}" class="has-text-black" id="title">
          <h1 class="title has-text-centered is-2 has-text-weight-semibold ">{{page.title}}</h1>
        </a>
        <hr class="has-background-black">

        <div class="content has-text-justified-desktop has-text-justified-fullhd has-text-justified has-text-justified-tablet has-text-left-mobile">
          <!-- CRITICAL CHANGE: Remove <p> wrapper -->
          {{ content }}
        </div>
      </div>
    </div>
  </section>
  {% include footer.html %}

  <!-- ADD LEAFLET JS AND MAP INITIALIZATION -->
  <script src="https://almerra.com/assets/js/leaflet.js"></script>
  <script>
    if (document.getElementById('map')) {
      console.log('Initializing map...');


      var mapElement = document.getElementById('map');
      if (mapElement._leaflet_id) {
        mapElement._leaflet_id = undefined;
      }

      if (window.gameMap) {
        window.gameMap.remove();
      }


      var gameMap = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: 0,
        maxZoom: 5,
        center: [6144, 6144],
        zoom: 2
      });

      var bounds = [[0, 0], [12288, 12288]];

      L.tileLayer('/assets/tiles/{z}/{x}/{y}.png', {
        bounds: bounds,
        noWrap: true,
        attribution: 'Map of Almerra'
      }).addTo(gameMap);

      gameMap.fitBounds(bounds);

    console.log('Loading Cities...');
    fetch('https://almerra.com/assets/data/markers.json')
      .then(response => response.json())
      .then(data => {
        data.markers.forEach(location => {
          const marker = L.marker([location.y, location.x]).addTo(window.gameMap);
          marker.bindPopup(location.name);
        });
        console.log('Cities loaded!');
      })
      .catch(error => console.error('Error loading locations:', error));
  }
  console.log('Almerra Map loaded!');
  </script>
</body>

</html>
