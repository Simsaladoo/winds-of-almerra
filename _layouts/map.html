<!DOCTYPE html>
<html>

<head>
  {% include head.html %}
  <!-- ADD LEAFLET CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* ADD MAP STYLING */
    #map { width: 100%; height: 600px; background: #1a1a2e; }
  </style>
</head>

<body class="body-sim">
  {% include navbar.html %}

  <section class="hero is-fullheight has-text-centered" id="post">
    <div class="hero-body hero-sim">
      <div class="container">
        <a href="{{page.url | relative_url}}" class="has-text-black" id="title">
          <h1 class="title has-text-centered is-2 has-text-weight-semibold ">{{page.title}}</h1>
        </a>
        <hr class="has-background-black">

        <div class="content has-text-justified-desktop has-text-justified-fullhd has-text-justified has-text-justified-tablet has-text-left-mobile">
          <!-- CRITICAL CHANGE: Remove <p> wrapper -->
          {{ content }}
        </div>
      </div>
    </div>
  </section>
  {% include footer.html %}

  <!-- ADD LEAFLET JS AND MAP INITIALIZATION -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // Only initialize if map div exists on this page
    if (document.getElementById('map')) {
      console.log('🗺️ Initializing map...');

      var gameMap = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: 0,
        maxZoom: 5,
        center: [6144, 6144],
        zoom: 2
      });

      var bounds = [[0, 0], [12288, 12288]];

      L.tileLayer('/assets/tiles/{z}/{x}/{y}.png', {
        bounds: bounds,
        noWrap: true,
        attribution: 'Game Map'
      }).addTo(gameMap);

      gameMap.fitBounds(bounds);
      console.log('✅ Map ready');
    }
  </script>
</body>

</html>
